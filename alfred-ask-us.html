<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ask Us</title>
</head>
<body>

  <h1>Ask Us</h1>
  <p>Have a question? Fill out the form below and we'll get back to you.</p>

  <form>
    <label>First Name:</label><br>
    <input type="text" placeholder="John" /><br><br>

    <label>Last Name:</label><br>
    <input type="text" placeholder="Aquino" /><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="you@example.com" /><br><br>

    <label>Message:</label><br>
    <textarea rows="5" cols="40" placeholder="Type your question here..."></textarea><br><br>

    <button type="submit">Send Message</button>
  </form>

</body>
</html>
